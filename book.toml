[book]
authors = ["Gabor Szabo"]
language = "en"
src = "src"
title = "Web development with Rust Axum"

# Add github icon to the menu
[output.html]
git-repository-url = "https://github.com/szabgab/axum.code-maven.com"
git-repository-icon = "fas-code-fork"
edit-url-template = "https://github.com/szabgab/axum.code-maven.com/edit/main/axum/{path}"
additional-js = ["custom.js", "addlinks.js"]

# Handle Youtube video embedding and the footer
[preprocessor.embedify]
footer.enable = true
footer.message = "Copyright © 2025 • Created with ❤️  by [Gábor Szabó](https://szabgab.com/)"




